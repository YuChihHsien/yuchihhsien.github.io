<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Lab | 余致賢 - Chih-Hsien Yu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20">

    <script src="js/lab_effects.js?v=8"></script>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WEYHDVGJ8C"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-WEYHDVGJ8C');
    </script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            /* Prevent body scroll */
        }

        /* Scroll Container for Snap Scrolling */
        #lab-scroll-container {
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Navbar Hiding Logic */
        nav {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        nav.nav-hidden {
            transform: translateY(-100%);
        }

        /* Section Container */
        .lab-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        canvas,
        .morph-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .lab-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lab-overlay h2 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .lab-overlay p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 500px;
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            font-size: 0.8rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0) translateX(-50%);
            }

            40% {
                transform: translateY(-10px) translateX(-50%);
            }

            60% {
                transform: translateY(-5px) translateX(-50%);
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-code"></i> C-H. Yu</a>
        <div class="nav-left">
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> <span data-zh="首頁"
                            data-en="Home">Home</span></a></li>
                <li><a href="resume.html"><i class="fa-solid fa-file-lines"></i> <span data-zh="履歷"
                            data-en="Resume">Resume</span></a></li>
                <li><a href="lab.html" class="active"><i class="fa-solid fa-flask"></i> <span data-zh="實驗室"
                            data-en="Lab">Lab</span></a></li>
                <li><a href="contact.html"><i class="fa-solid fa-mug-hot"></i> <span data-zh="贊助"
                            data-en="Support">Support</span></a></li>
            </ul>
            <div class="nav-controls">
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">☀️</button>
                <button id="lang-toggle" class="icon-btn lang-btn" onclick="toggleLanguage()"
                    title="Toggle Language">EN</button>
                <div class="hamburger">
                    <span class="line1"></span>
                    <span class="line2"></span>
                    <span class="line3"></span>
                </div>
            </div>
        </div>
    </nav>

    <div id="lab-scroll-container">
        <!-- Section 1: Fluid Simulation -->
        <section class="lab-section">
            <canvas id="fluid-canvas"></canvas>
            <div class="lab-overlay">
                <h2 data-zh="流體動力學" data-en="Fluid Dynamics">Fluid Dynamics</h2>
                <p data-zh="實驗 01: 基於 WebGL 的氣流與流體運動模擬。" data-en="Exp 01: WebGL-based air and fluid motion simulation.">
                </p>
            </div>
            <div class="scroll-hint">
                <p data-zh="向下滾動探索更多" data-en="Scroll Down to Explore">Scroll Down to Explore</p>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </section>

        <!-- Section 2: Gravity Particles -->
        <section class="lab-section">
            <canvas id="gravity-canvas"></canvas>
            <div class="lab-overlay">
                <h2 data-zh="重力粒子" data-en="Gravity Particles">Gravity Particles</h2>
                <p data-zh="實驗 02: 具備滑鼠斥力與引力的粒子系統，模擬微觀物理。"
                    data-en="Exp 02: Particle system with mouse repulsion and attraction."></p>
            </div>
        </section>

        <!-- Section 3: 3D Morphing Sphere -->
        <section class="lab-section">
            <div id="morph-container" class="morph-container"></div>
            <div class="lab-overlay">
                <h2 data-zh="3D 幾何形變" data-en="3D Morphing">3D Morphing</h2>
                <p data-zh="實驗 03: 使用 Three.js 構建的參數化 3D 形變幾何體。"
                    data-en="Exp 03: Parametric 3D morphing geometry built with Three.js."></p>
            </div>
        </section>

        <!-- Section 4: Orbital Odyssey -->
        <section class="lab-section">
            <div id="orbit-container" class="morph-container"></div>
            <div class="lab-overlay">
                <h2 data-zh="軌道奧德賽" data-en="Orbital Odyssey">Orbital Odyssey</h2>
                <p data-zh="實驗 04: 3D 太空人與飛船繞行行星，模擬深空軌道力學。"
                    data-en="Exp 04: 3D astronaut and spaceship orbiting a planet, simulating deep space orbital mechanics.">
                </p>
            </div>
        </section>

        <!-- Section 5: Cyber Runner (Dino Game) -->
        <section class="lab-section" id="dino-game-section">
            <canvas id="dino-canvas" style="background: #000; cursor: pointer;"></canvas>
            <div class="lab-overlay" style="background: rgba(0,0,0,0.4);">
                <h2 data-zh="賽博跑酷" data-en="Cyber Runner">Cyber Runner</h2>
                <p data-zh="實驗 05: 側向捲軸障礙避開遊戲。(按下空白鍵或點擊跳躍)"
                    data-en="Exp 05: Side-scrolling obstacle avoidance game. (Press Space or Click to Jump)">
                </p>
            </div>
        </section>

    </div> <!-- End #lab-scroll-container -->

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" title="Back to Top" onclick="scrollToTop()">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <div class="terminal-widget">
        <button class="terminal-toggle" onclick="toggleTerminal()" title="Open Terminal">
            <i class="fa-solid fa-terminal"></i>
        </button>
        <div class="terminal-window" id="terminalWindow">
            <div class="terminal-header">
                <div class="terminal-title">GA-RY_OS v1.0.4</div>
                <button class="terminal-action-btn" onclick="toggleTerminal()"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="terminal-body" id="terminalBody">
                <p class="terminal-msg system">--- GA-RY TERMINAL v1.0 ---</p>
                <p class="terminal-msg system">System: Connection established. Type 'help' for commands.</p>
            </div>
            <form class="terminal-footer" id="terminalForm">
                <span class="terminal-prompt">></span>
                <input type="text" class="terminal-input" id="terminalInput" placeholder="..." autocomplete="off">
                <button type="submit" class="terminal-action-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webgl-fluid"></script>

    <!-- Scripts -->
    <script src="js/main.js?v=9"></script>
    <script src="js/terminal.js"></script>
    <script src="js/lab_effects.js"></script>
    <script src="js/dino_game.js"></script>
    <script>
        // Fluid Simulation Configuration
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('fluid-canvas');
            if (typeof WebGLFluid !== 'undefined') {
                WebGLFluid(canvas, {
                    TRIGGER: 'hover',
                    SIM_RESOLUTION: 128,
                    DYE_RESOLUTION: 1024,
                    CAPTURE_RESOLUTION: 512,
                    DENSITY_DISSIPATION: 1,
                    VELOCITY_DISSIPATION: 0.2,
                    PRESSURE: 0.8,
                    PRESSURE_ITERATIONS: 20,
                    CURL: 30,
                    SPLAT_RADIUS: 0.25,
                    SPLAT_FORCE: 6000,
                    SHADING: true,
                    COLORFUL: true,
                    COLOR_UPDATE_SPEED: 10,
                    PAUSED: false,
                    BACK_COLOR: { r: 0, g: 0, b: 0 },
                    TRANSPARENT: false,
                    BLOOM: true,
                    BLOOM_ITERATIONS: 8,
                    BLOOM_RESOLUTION: 256,
                    BLOOM_INTENSITY: 0.8,
                    BLOOM_THRESHOLD: 0.6,
                    BLOOM_SOFT_KNEE: 0.7,
                    SUNRAYS: true,
                    SUNRAYS_RESOLUTION: 196,
                    SUNRAYS_WEIGHT: 1.0,
                });
            }
        });

        // Scroll Logic for Back to Top Button & Navbar Hiding
        let lastScrollTop = 0;
        const scrollContainer = document.getElementById('lab-scroll-container');

        function scrollToTop() {
            scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Listen to the container scroll instead of window
        scrollContainer.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            const nav = document.querySelector('nav');
            let scrollTop = scrollContainer.scrollTop;

            // Back to Top visibility
            if (scrollTop > 100) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }

            // Navbar hiding logic - Immediate hide when scrolling down
            if (scrollTop > lastScrollTop && scrollTop > 50) {
                // Scrolling down
                nav.classList.add('nav-hidden');
            } else if (scrollTop < lastScrollTop) {
                // Scrolling up
                nav.classList.remove('nav-hidden');
            }

            // Force show at the very top
            if (scrollTop <= 10) {
                nav.classList.remove('nav-hidden');
            }

            lastScrollTop = scrollTop;
        }, { passive: true });

        // Initialize Dino Game
        window.addEventListener('load', () => {
            initDinoGame('dino-canvas', 'dino-game-section');
        });
    </script>
</body>

</html>
