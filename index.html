<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chih-Hsien Yu | 余致賢 - Software Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=4">
    <style>
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: calc(100vh - 160px);
            gap: 4rem;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .hero h1 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .hero h1 span.zh {
            font-size: 2.25rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-left: 1rem;
        }

        .hero h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.125rem;
            margin-bottom: 2.5rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .hero p.zh-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent-color);
            padding-left: 1rem;
            margin-top: -1.5rem;
            margin-bottom: 2.5rem;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 450px;
        }

        .particle-bg {
            position: absolute;
            top: -50px;
            left: -50px;
            width: calc(100% + 100px);
            height: calc(100% + 100px);
            z-index: 0;
            pointer-events: none;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 4/5;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-hover);
            z-index: 1;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .image-wrapper:hover img {
            transform: scale(1.05);
        }

        /* Skills preview */
        .skills-preview {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .skill-tag {
            padding: 0.5rem 1rem;
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-soft);
        }

        .skill-tag:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        @media (max-width: 992px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                gap: 2rem;
                padding-top: 2rem;
            }

            .hero-content {
                align-items: center;
                display: flex;
                flex-direction: column;
            }

            .hero p.zh-desc {
                border-left: none;
                padding-left: 0;
            }

            .cta-group,
            .skills-preview {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="nav-brand"><i class="fa-solid fa-code"></i> C-H. Yu</a>
        <div class="nav-left">

                            data-en="Home">首頁</span></a></li>

                            data-en="Resume">履歷</span></a></li>

                            data-en="Projects">專案</span></a></li>
                <li><a href="contact.html"><i class="fa-solid fa-envelope"></i> <span data-zh="聯絡"
                            data-en="Contact">聯絡</span></a></li>

            <div class="nav-controls">
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">☀️</button>

                <div class="hamburger">
                    <span class="line1"></span>
                    <span class="line2"></span>
                    <span class="line3"></span>

            </div>
        </div>
    </nav>

    <div class="container">
        <main class="hero">
            <div class="hero-content">
                <h2 class="slide-up">Senior Software Engineer</h2>
                <h1 class="slide-up delay-1">Chih-Hsien Yu <span class="zh">余致賢</span></h1>

                <p class="slide-up delay-2"
                    data-zh="擁有跨國環境與多地開發經驗的資深軟體工程師，專注於系統穩定性、雲端架構 (AWS/K8s) 以及分散式後端系統 (.NET/Kafka) 的最佳化設計。"
                    data-en="Delivering high-quality, scalable solutions through a proactive and determined approach. Specialized in backend architecture, system stability, and cloud infrastructure.">
                    擁有跨國環境與多地開發經驗的資深軟體工程師，專注於系統穩定性、雲端架構 (AWS/K8s) 以及分散式後端系統 (.NET/Kafka) 的最佳化設計。
                </p>
                <p class="zh-desc slide-up delay-2" data-zh="具備前瞻性的技術視野，能在團隊中推動最佳實踐與程式碼品質。"
                    data-en="With a forward-thinking technical vision, I drive best practices and code quality within the team.">
                    具備前瞻性的技術視野，能在團隊中推動最佳實踐與程式碼品質。
                </p>

                <div class="cta-group slide-up delay-3">
                    <a href="resume.html" class="btn btn-primary"><i class="fa-solid fa-file-pdf"
                            style="margin-right: 8px;"></i><span data-zh="看履歷" data-en="View Resume">看履歷</span></a>
                    <a href="projects.html" class="btn btn-outline"><i class="fa-solid fa-diagram-project"
                            style="margin-right: 8px;"></i><span data-zh="看專案" data-en="Explore Projects">看專案</span></a>

                            data-en="Let's Connect">聯絡與支持</span></a>
                </div>

                <div class="skills-preview slide-up delay-3">
                    <span class="skill-tag">.NET Core / C#</span>
                    <span class="skill-tag">AWS Cloud</span>
                    <span class="skill-tag">Kubernetes</span>
                    <span class="skill-tag">Microservices</span>
                    <span class="skill-tag">Kafka</span>
                </div>
            </div>

            <div class="hero-image slide-up delay-1">
                <canvas id="particle-canvas" class="particle-bg"></canvas>
                <div class="image-wrapper">
                    <img src="./img/public/my.jpg" alt="Profile Picture">

            </div>
        </main>
    </div>

    <footer>
        <p>&copy; <span id="year"></span> <span data-zh="余致賢" data-en="Chih-Hsien Yu">余致賢</span>. All rights reserved.
        </p>
    </footer>

    <script src="js/main.js?v=4"></script>
