<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贊助 Support | 余致賢 - Chih-Hsien Yu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=21">

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WEYHDVGJ8C"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-WEYHDVGJ8C');
    </script>
    <style>
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-header h1 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .contact-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Donation Section */
        .donation-section {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
        }

        .donation-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        .donation-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .donation-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
        }

        .donation-card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            width: 280px;
            transition: transform var(--transition-medium), box-shadow var(--transition-medium);
        }

        .donation-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: var(--shadow-hover);
        }

        .donation-card h4 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .donation-card p {
            font-size: 0.9rem;
            margin-bottom: 0;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .contact-header h1 {
                font-size: 1.75rem;
            }

            .donation-card {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>

<body>

    <div id="nav-container"></div>

    <div class="container" style="padding-top: 6rem;">

        <header class="contact-header fade-in">
            <h1 data-zh="支持與贊助" data-en="Buy Me a Coffee">支持與贊助</h1>
            <p data-zh="如果您覺得我的專案與分享有幫助，歡迎請我喝杯咖啡 ☕"
                data-en="If you find my work helpful, consider buying me a coffee ☕">
                如果您覺得我的專案與分享有幫助，歡迎請我喝杯咖啡 ☕</p>
        </header>

        <section class="donation-section animate-on-scroll">
            <h2 class="donation-title" data-zh="歡迎 DONATE，功德無量謝謝您！" data-en="Donations Welcome & Appreciated!">歡迎
                DONATE，功德無量謝謝您！</h2>
            <p class="donation-subtitle" data-zh="您的支持將幫助我持續開源貢獻與分享技術文章 ☕"
                data-en="Your support helps me continue open-source contributions and sharing tech articles ☕">
                您的支持將幫助我持續開源貢獻與分享技術文章 ☕</p>

            <div class="donation-grid">
                <div class="donation-card bmac-card">
                    <i class="fa-solid fa-mug-hot bmac-icon"></i>
                    <h4 data-zh="Buy Me a Coffee" data-en="Buy Me a Coffee">Buy Me a Coffee</h4>
                    <p data-zh="透過信用卡或 PayPal 贊助<br>安全又快速" data-en="Support via Credit Card or PayPal<br>Safe and fast">
                        透過信用卡或 PayPal 贊助<br>安全又快速
                    </p>
                    <a href="https://buymeacoffee.com/garyyu" target="_blank" class="btn btn-primary bmac-btn">
                        <span data-zh="前往贊助 ❤️" data-en="Support Now ❤️">前往贊助 ❤️</span>
                    </a>
                </div>
            </div>
        </section>

    </div>

    <div id="footer-container"></div>

    <div class="terminal-widget">
        <button class="terminal-toggle" onclick="toggleTerminal()" title="Open Terminal">
            <i class="fa-solid fa-terminal"></i>
        </button>
        <div class="terminal-window" id="terminalWindow">
            <div class="terminal-header">
                <div class="terminal-title">GA-RY_OS v1.0.4</div>
                <button class="terminal-action-btn" onclick="toggleTerminal()"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="terminal-body" id="terminalBody">
                <p class="terminal-msg system">--- GA-RY TERMINAL v1.0 ---</p>
                <p class="terminal-msg system">System: Connection established. Type 'help' for commands.</p>
            </div>
            <form class="terminal-footer" id="terminalForm">
                <span class="terminal-prompt">></span>
                <input type="text" class="terminal-input" id="terminalInput" placeholder="..." autocomplete="off">
                <button type="submit" class="terminal-action-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/main.js?v=21"></script>
    <script src="js/terminal.js"></script>
</body>

</html>
