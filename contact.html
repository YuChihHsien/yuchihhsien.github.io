    <style>
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-header h1 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .contact-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            transition: all var(--transition-fast);
            cursor: pointer;
            text-decoration: none;
            box-shadow: var(--shadow-soft);
        }

        .social-btn img {
            width: 36px;
            height: 36px;
            transition: transform var(--transition-fast);
        }

        .social-btn:hover {
            transform: translateY(-5px);
        }

        .social-btn.line:hover {
            border-color: #00c300;
            box-shadow: 0 10px 20px rgba(0, 195, 0, 0.2);
        }

        .social-btn.ig:hover {
            border-color: #e1306c;
            box-shadow: 0 10px 20px rgba(225, 48, 108, 0.2);
        }

        .social-btn.linkedin:hover i {
            color: #0e76a8;
        }

        .social-btn.linkedin:hover {
            border-color: #0e76a8;
            box-shadow: 0 10px 20px rgba(14, 118, 168, 0.2);
        }

        .social-btn.email:hover i {
            color: #ea4335;
        }

        .social-btn.email:hover {
            border-color: #ea4335;
            box-shadow: 0 10px 20px rgba(234, 67, 53, 0.2);
        }

        .social-btn:hover img,
        .social-btn:hover i {
            transform: scale(1.15);
        }

        .social-btn i {
            font-size: 32px;
            color: var(--text-secondary);
            transition: transform var(--transition-fast), color var(--transition-fast);
        }

        /* Donation Section */
        .donation-section {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
        }

        .donation-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        .donation-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .donation-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
        }

        .donation-card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            width: 280px;
            transition: transform var(--transition-medium), box-shadow var(--transition-medium);
        }

        .donation-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: var(--shadow-hover);
        }

        .donation-card img {
            width: 100%;
            max-width: 220px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            cursor: pointer;
            transition: filter var(--transition-fast);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .donation-card img:hover {
            filter: brightness(1.05);
        }

        .donation-card h4 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .donation-card p {
            font-size: 0.9rem;
            margin-bottom: 0;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Modal for images */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity var(--transition-medium);
        }

        [data-theme="dark"] .modal {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            text-align: center;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .close-btn:hover {
            color: var(--accent-color);
        }

        @media (max-width: 768px) {
            .contact-header h1 {
                font-size: 1.75rem;
            }

            .donation-card {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>

    <script src="js/main.js?v=4"></script>
    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');

        function openModal(src) {
            modalImg.src = src;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.body.style.overflow = '';
            setTimeout(() => { modalImg.src = ''; }, 300);
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === "Escape" && modal.classList.contains('show')) {
                closeModal();
            }
        });
    </script>
